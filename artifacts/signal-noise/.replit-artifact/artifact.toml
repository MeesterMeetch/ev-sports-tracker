kind = "web"
previewPath = "/signal/"
title = "Signal vs. Noise"
version = "1.0.0"
id = "artifacts/signal-noise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/signal/" ]
localPort = 18378

[services.development]
run = "pnpm --filter @workspace/signal-noise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/signal-noise", "run", "build" ]
publicDir = "artifacts/signal-noise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18378"
BASE_PATH = "/signal/"
