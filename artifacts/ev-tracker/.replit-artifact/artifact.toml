kind = "web"
previewPath = "/"
title = "EV Sports Tracker"
version = "1.0.0"
id = "artifacts/ev-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25718

[services.development]
run = "pnpm --filter @workspace/ev-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ev-tracker", "run", "build" ]
publicDir = "artifacts/ev-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25718"
BASE_PATH = "/"
