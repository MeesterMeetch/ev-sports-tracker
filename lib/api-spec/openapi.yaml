openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: EV Sports Betting Tracker + Signal vs. Noise API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: odds
    description: Live odds and EV analysis
  - name: bets
    description: Bet card management
  - name: analysis
    description: AI analysis
  - name: email
    description: Signal vs. Noise email intelligence
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /odds/sports:
    get:
      operationId: listSports
      tags: [odds]
      summary: List available sports
      responses:
        "200":
          description: List of sports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sport"

  /odds/games:
    get:
      operationId: listGames
      tags: [odds]
      summary: List today's games with odds and EV calculations
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
        - name: markets
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Games with odds and EV data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameWithOdds"

  /odds/ev-card:
    get:
      operationId: getEvCard
      tags: [odds]
      summary: Get today's positive EV bet card
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
        - name: minEv
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Positive EV bets and near misses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvCard"

  /odds/starters:
    get:
      operationId: listStarters
      tags: [odds]
      summary: Get probable starters for today's MLB and NHL games
      responses:
        "200":
          description: Probable starters by game
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameStarter"

  /odds/near-misses:
    get:
      operationId: getNearMisses
      tags: [odds]
      summary: Get top near-miss bets for today
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Near-miss bets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearMiss"

  /bets:
    get:
      operationId: listBets
      tags: [bets]
      summary: List saved bets
      responses:
        "200":
          description: List of tracked bets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bet"
    post:
      operationId: createBet
      tags: [bets]
      summary: Save a bet to the tracker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BetInput"
      responses:
        "201":
          description: Bet saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"

  /bets/{id}:
    patch:
      operationId: updateBet
      tags: [bets]
      summary: Update bet result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BetUpdate"
      responses:
        "200":
          description: Updated bet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
    delete:
      operationId: deleteBet
      tags: [bets]
      summary: Delete a bet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bets/stats:
    get:
      operationId: getBetStats
      tags: [bets]
      summary: Get bankroll stats and ROI summary
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetStats"

  /analysis/game:
    post:
      operationId: analyzeGame
      tags: [analysis]
      summary: AI analysis of a game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameAnalysisInput"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /email/sync:
    post:
      operationId: syncEmails
      tags: [email]
      summary: Fetch latest emails from Gmail and run AI signal scoring
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncInput"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /email/signals:
    get:
      operationId: listSignals
      tags: [email]
      summary: List processed emails with signal scores
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: "Filter: signal | noise | all (default: all)"
        - name: minScore
          in: query
          required: false
          schema:
            type: integer
          description: Minimum signal score 0-100
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Email signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailSignal"

  /email/actions:
    get:
      operationId: listActions
      tags: [email]
      summary: List extracted action items
      parameters:
        - name: done
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Action items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActionItem"

  /email/actions/{id}:
    patch:
      operationId: updateAction
      tags: [email]
      summary: Mark action item done/undone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionUpdate"
      responses:
        "200":
          description: Updated action item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"

  /email/entities:
    get:
      operationId: listEntities
      tags: [email]
      summary: List key people, companies and topics mentioned across emails
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: "Filter: person | company | topic | org"
      responses:
        "200":
          description: Entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EntityCount"

  /email/trends:
    get:
      operationId: listTrends
      tags: [email]
      summary: Emerging topics and trends across recent emails
      responses:
        "200":
          description: Trends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trend"

  /email/stats:
    get:
      operationId: getEmailStats
      tags: [email]
      summary: Signal vs. noise inbox stats
      responses:
        "200":
          description: Email stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailStats"

components:
  schemas:
    GameStarter:
      type: object
      required: [homeTeam, awayTeam, sport, starterType, confirmed]
      properties:
        homeTeam:
          type: string
        awayTeam:
          type: string
        sport:
          type: string
        homeStarter:
          type: ["string", "null"]
        awayStarter:
          type: ["string", "null"]
        starterType:
          type: string
          description: "pitcher | goalie"
        confirmed:
          type: boolean

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Sport:
      type: object
      required: [key, title, active]
      properties:
        key:
          type: string
        title:
          type: string
        active:
          type: boolean
        hasOdds:
          type: boolean

    Outcome:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        price:
          type: number
        point:
          type: ["number", "null"]

    Market:
      type: object
      required: [key, outcomes]
      properties:
        key:
          type: string
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/Outcome"

    Bookmaker:
      type: object
      required: [key, title, markets]
      properties:
        key:
          type: string
        title:
          type: string
        markets:
          type: array
          items:
            $ref: "#/components/schemas/Market"

    EvBet:
      type: object
      required: [gameId, homeTeam, awayTeam, sport, market, selection, bookmaker, americanOdds, noVigProb, estimatedProb, evPercent, kellyFraction, suggestedUnits, commenceTime]
      properties:
        gameId:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        sport:
          type: string
        market:
          type: string
        selection:
          type: string
        point:
          type: ["number", "null"]
        bookmaker:
          type: string
        americanOdds:
          type: number
        noVigProb:
          type: number
        estimatedProb:
          type: number
        evPercent:
          type: number
        kellyFraction:
          type: number
        suggestedUnits:
          type: number
        commenceTime:
          type: string
        sharpOdds:
          type: ["number", "null"]
        sharpBook:
          type: ["string", "null"]
        confidence:
          type: ["integer", "null"]
        lineAgeMinutes:
          type: ["integer", "null"]

    NearMiss:
      type: object
      required: [gameId, homeTeam, awayTeam, sport, market, selection, bookmaker, americanOdds, evPercent, breakEvenOdds, commenceTime]
      properties:
        gameId:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        sport:
          type: string
        market:
          type: string
        selection:
          type: string
        point:
          type: ["number", "null"]
        bookmaker:
          type: string
        americanOdds:
          type: number
        evPercent:
          type: number
        breakEvenOdds:
          type: number
        commenceTime:
          type: string

    SharpCoverage:
      type: object
      required: [gamesEvaluated, gamesWithSharpH2H, gamesWithSharpSpreads, gamesWithSharpTotals]
      properties:
        gamesEvaluated:
          type: integer
        gamesWithSharpH2H:
          type: integer
        gamesWithSharpSpreads:
          type: integer
        gamesWithSharpTotals:
          type: integer

    EvCard:
      type: object
      required: [date, bets, nearMisses, hasBets, requestsRemaining]
      properties:
        date:
          type: string
        bets:
          type: array
          items:
            $ref: "#/components/schemas/EvBet"
        nearMisses:
          type: array
          items:
            $ref: "#/components/schemas/NearMiss"
        hasBets:
          type: boolean
        requestsRemaining:
          type: ["integer", "null"]
        quotaExhausted:
          type: boolean
        sharpCoverage:
          $ref: "#/components/schemas/SharpCoverage"

    GameWithOdds:
      type: object
      required: [id, homeTeam, awayTeam, sport, commenceTime, bookmakers]
      properties:
        id:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        sport:
          type: string
        commenceTime:
          type: string
        bookmakers:
          type: array
          items:
            $ref: "#/components/schemas/Bookmaker"

    Bet:
      type: object
      required: [id, gameId, homeTeam, awayTeam, sport, market, selection, bookmaker, americanOdds, evPercent, units, status, commenceTime, createdAt]
      properties:
        id:
          type: integer
        gameId:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        sport:
          type: string
        market:
          type: string
        selection:
          type: string
        point:
          type: ["number", "null"]
        bookmaker:
          type: string
        americanOdds:
          type: number
        evPercent:
          type: number
        units:
          type: number
        status:
          type: string
        pnl:
          type: ["number", "null"]
        commenceTime:
          type: string
        createdAt:
          type: string
        notes:
          type: ["string", "null"]
        closingOdds:
          type: ["integer", "null"]
        clvPercent:
          type: ["number", "null"]

    BetInput:
      type: object
      required: [gameId, homeTeam, awayTeam, sport, market, selection, bookmaker, americanOdds, evPercent, units, commenceTime]
      properties:
        gameId:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        sport:
          type: string
        market:
          type: string
        selection:
          type: string
        point:
          type: ["number", "null"]
        bookmaker:
          type: string
        americanOdds:
          type: number
        evPercent:
          type: number
        units:
          type: number
        commenceTime:
          type: string
        notes:
          type: ["string", "null"]

    BetUpdate:
      type: object
      properties:
        status:
          type: string
        pnl:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        closingOdds:
          type: ["integer", "null"]

    BetStats:
      type: object
      required: [totalBets, wins, losses, pushes, pending, roi, totalUnitsWagered, totalPnl, winRate]
      properties:
        totalBets:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        pushes:
          type: integer
        pending:
          type: integer
        roi:
          type: number
        totalUnitsWagered:
          type: number
        totalPnl:
          type: number
        winRate:
          type: number
        bySport:
          type: array
          items:
            $ref: "#/components/schemas/SportStats"

    SportStats:
      type: object
      required: [sport, bets, wins, roi]
      properties:
        sport:
          type: string
        bets:
          type: integer
        wins:
          type: integer
        roi:
          type: number

    GameAnalysisInput:
      type: object
      required: [gameId, homeTeam, awayTeam, sport]
      properties:
        gameId:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        sport:
          type: string
        market:
          type: ["string", "null"]
        additionalContext:
          type: ["string", "null"]

    AnalysisResult:
      type: object
      required: [gameId, analysis, recommendation, confidence]
      properties:
        gameId:
          type: string
        analysis:
          type: string
        recommendation:
          type: string
        confidence:
          type: integer
        keyFactors:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string

    SyncInput:
      type: object
      properties:
        maxEmails:
          type: integer
          description: Max emails to fetch and analyze (default 20)
        query:
          type: ["string", "null"]
          description: Gmail search query (default is:inbox)

    SyncResult:
      type: object
      required: [processed, skipped, newSignals, newActions]
      properties:
        processed:
          type: integer
        skipped:
          type: integer
        newSignals:
          type: integer
        newActions:
          type: integer
        durationMs:
          type: integer

    EmailSignal:
      type: object
      required: [id, gmailId, fromName, fromEmail, subject, date, bodySnippet, signalScore, category, summary, topics, processedAt]
      properties:
        id:
          type: integer
        gmailId:
          type: string
        fromName:
          type: string
        fromEmail:
          type: string
        subject:
          type: string
        date:
          type: string
        bodySnippet:
          type: string
        signalScore:
          type: integer
          description: 0-100, higher = more signal
        category:
          type: string
          description: signal | noise
        summary:
          type: string
        topics:
          type: array
          items:
            type: string
        processedAt:
          type: string

    ActionItem:
      type: object
      required: [id, emailId, text, priority, done, createdAt]
      properties:
        id:
          type: integer
        emailId:
          type: integer
        text:
          type: string
        deadline:
          type: ["string", "null"]
        priority:
          type: string
          description: high | medium | low
        done:
          type: boolean
        createdAt:
          type: string

    ActionUpdate:
      type: object
      properties:
        done:
          type: boolean
        text:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]

    EntityCount:
      type: object
      required: [name, type, count]
      properties:
        name:
          type: string
        type:
          type: string
          description: person | company | topic | org
        count:
          type: integer

    Trend:
      type: object
      required: [topic, count, recentEmails]
      properties:
        topic:
          type: string
        count:
          type: integer
        recentEmails:
          type: array
          items:
            type: string
          description: Recent email subjects mentioning this topic

    EmailStats:
      type: object
      required: [total, signals, noise, signalRate, avgSignalScore, pendingActions, topSenders]
      properties:
        total:
          type: integer
        signals:
          type: integer
        noise:
          type: integer
        signalRate:
          type: number
        avgSignalScore:
          type: number
        pendingActions:
          type: integer
        topSenders:
          type: array
          items:
            $ref: "#/components/schemas/SenderStat"

    SenderStat:
      type: object
      required: [fromEmail, fromName, count, avgScore]
      properties:
        fromEmail:
          type: string
        fromName:
          type: string
        count:
          type: integer
        avgScore:
          type: number
